<!DOCTYPE html>
<html>
<head>
    <title>Fancify My Text</title>
    <script src="fancifymytext.js"></script>
</head>
<body>
    <h1>Fancify My Text</h1>

    <fieldset>
        <legend>Text</legend>
        <textarea id="userInput" rows="4" cols="30"></textarea>
    </fieldset>

    <fieldset>
        <legend>Fancify</legend>
        
        <button onclick="biggerText()">Bigger!</button><br><br>

        <label>
            <input type="radio" id="fancy" name="style" onchange="changeStyle()"> FancyShmancy
        </label>
        <label>
            <input type="radio" id="boring" name="style" onchange="changeStyle()" checked> BoringBetty
        </label><br><br>

        <button onclick="mooify()">Moo</button>
    </fieldset>

</body>
</html>
